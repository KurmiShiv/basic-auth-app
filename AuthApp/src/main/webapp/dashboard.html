<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard | AuthApp</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#f4f6f9;
}

header{
    background:#4facfe;
    color:#fff;
    padding:18px 30px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

header h2{
    font-size:24px;
}

.logout-btn{
    padding:10px 18px;
    background:#fff;
    color:#4facfe;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-weight:bold;
}

.logout-btn:hover{
    background:#eaf4ff;
}

.container{
    max-width:900px;
    margin:60px auto;
    padding:30px;
}

.card{
    background:#fff;
    padding:40px;
    border-radius:14px;
    box-shadow:0 10px 25px rgba(0,0,0,0.08);
    text-align:center;
}

.card h1{
    color:#333;
    margin-bottom:15px;
}

.card p{
    color:#666;
    font-size:18px;
    margin-bottom:25px;
}

.success{
    color:green;
    font-weight:bold;
    font-size:22px;
}
</style>
</head>

<body>

<header>
    <h2>AuthApp Dashboard</h2>
    <button class="logout-btn" onclick="logout()">Logout</button>
</header>

<div class="container">

    <div class="card">

        <h1>Welcome User 🎉</h1>

        <p class="success">Successfully Logged In</p>

        <p>You are now inside the dashboard page.</p>

        <p>This page loads after valid login credentials.</p>

    </div>

</div>
<script >
function logout() {
    window.location.href = "index.html";
}
</script>
</body>
</html>
